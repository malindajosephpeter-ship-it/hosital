        <button class="btn btn-ghost btn-sm mt" id="addUser">${I.plus} Mtumiaji Mpya</button>
        <div class="divider"></div>
        <div class="section-title" style="margin-top:0">Data & Hifadhi</div>
        <div class="btn-row">
          <button class="btn btn-ghost btn-sm" id="exportData">⬇️ Hifadhi Nakala (Backup)</button>
          <button class="btn btn-ghost btn-sm" id="importData">⬆️ Rejesha Nakala</button>
          <button class="btn btn-danger btn-sm" id="resetData">Futa Data Yote</button>
        </div>
        <input type="file" id="importFile" accept="application/json" class="hidden">
      </div>`:''}
    </div>
  </div>`;

  // ---- product price editing (store + admin) ----
  if(canEditPrices){
    const ps=document.getElementById('prSearch'); if(ps) ps.oninput=e=>{ STATE.prSearch=e.target.value; pageSettings(el); document.getElementById('prSearch').focus(); };
    document.querySelectorAll('[data-prsave]').forEach(b=>b.onclick=()=>{
      const tr=b.closest('tr'); const p=DB.products.find(x=>x.id===b.dataset.prsave);
      const price=+tr.querySelector('[data-pf="price"]').value||0;
      const cost=+tr.querySelector('[data-pf="cost"]').value||0;
      const promo=+tr.querySelector('[data-pf="promoPrice"]').value||0;
      if(!price){ toast('Bei ya kuuza inahitajika','err'); return; }
      Object.assign(p,{price,cost,promoPrice:promo}); audit('Hariri bei',p.name+' • '+fmt(price)); save(); toast('Bei imehifadhiwa');
    });
  }
  if(!isAdmin) return;
  // ---- admin business settings ----
  document.getElementById('stSave').onclick=()=>{
    Object.assign(s,{name:val('stName'),location:val('stLoc'),phone:val('stPhone'),vat:num('stVat'),lowStock:num('stLow')||5,loyaltyRate:num('stLoy')||1,receiptWidth:val('stRcpt')||'58',showLoginHint:val('stHint')==='1'});
    audit('Mipangilio','Imebadilishwa'); save(); toast('Mipangilio imehifadhiwa'); renderApp();
  };
  document.getElementById('addUser').onclick=()=>userForm(el,null);
  const tp=document.getElementById('togglePins'); if(tp) tp.onclick=()=>{ STATE.showPins=!STATE.showPins; pageSettings(el); };
  document.querySelectorAll('[data-uedit]').forEach(r=>r.onclick=()=>userForm(el,r.dataset.uedit));
  document.getElementById('exportData').onclick=()=>{
    const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='jmhouse-backup-'+today()+'.json'; a.click();
    toast('Nakala imepakuliwa');
  };
  document.getElementById('importData').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=e=>{
    const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ DB=JSON.parse(r.result); save(); toast('Nakala imerejeshwa'); renderApp(); }catch(err){ toast('Faili si sahihi','err'); } };
    r.readAsText(f);
  };
  document.getElementById('resetData').onclick=()=>{ if(confirm('Hakika? Data YOTE itafutwa!')){ localStorage.removeItem(DB_KEY); DB=seed(); save(); toast('Data imefutwa'); renderApp(); } };
}
function userForm(el, uid_){
  const u = uid_ ? DB.users.find(x=>x.id===uid_) : null;
  const roleOpt = (v,l)=>`<option value="${v}" ${u&&u.role===v?'selected':''}>${l}</option>`;
  const m=modal(u?'Hariri Mtumiaji':'Mtumiaji Mpya',`
    <div class="form-grid">
      <div class="full"><label class="mini">Jina *</label><input class="inp" id="uName" value="${u?u.name:''}"></div>
      <div><label class="mini">Username *</label><input class="inp" id="uUser" value="${u?u.username:''}"></div>
      <div><label class="mini">PIN *</label><input class="inp" id="uPin" inputmode="numeric" value="${u?u.pin:''}"></div>
      <div class="full"><label class="mini">Wadhifa</label><select class="inp" id="uRole">
        ${roleOpt('admin','Meneja Mkuu (Admin)')}${roleOpt('cashier','Muuzaji (Cashier)')}
        ${roleOpt('store','Stoo (Storekeeper)')}${roleOpt('accountant','Fedha (Accountant)')}</select></div>
      ${u?`<div class="full"><label class="mini">Hali</label><select class="inp" id="uActive"><option value="1" ${u.active?'selected':''}>Hai</option><option value="0" ${!u.active?'selected':''}>Imezimwa</option></select></div>`:''}
    </div>`,
    `${u&&u.id!==STATE.user.id?'<button class="btn btn-danger btn-sm" id="uDel">Futa</button>':''}<button class="btn btn-ghost btn-sm" data-close>Ghairi</button><button class="btn btn-primary btn-sm" id="uSave">Hifadhi</button>`,{glass:true});
  document.getElementById('uSave').onclick=()=>{
    const name=val('uName'),un=val('uUser'),pin=val('uPin');
    if(!name||!un||!pin){ toast('Jaza sehemu zote','err'); return; }
    const dup=DB.users.find(x=>x.username.toLowerCase()===un.toLowerCase() && (!u||x.id!==u.id));
    if(dup){ toast('Username ipo tayari','err'); return; }
    if(u){ Object.assign(u,{name,username:un,pin,role:val('uRole'),active:val('uActive')==='1'}); audit('Hariri mtumiaji',name); }
    else { DB.users.push({id:uid('u'),name,username:un,pin,role:val('uRole'),active:true}); audit('Mtumiaji mpya',name); }
    save(); m.close(); toast('Imehifadhiwa'); pageSettings(el);
  };
  if(u&&u.id!==STATE.user.id){ document.getElementById('uDel').onclick=()=>{ if(confirm('Futa mtumiaji '+u.name+'?')){ DB.users=DB.users.filter(x=>x.id!==u.id); audit('Futa mtumiaji',u.name); save(); m.close(); toast('Mtumiaji amefutwa'); pageSettings(el); } }; }
}

/* ================= INIT ================= */
load();
renderLogin();
cloudInit();   // pull shared data, then keep this device in sync with all others

/* phone back button: if not on dashboard, go to dashboard instead of leaving app */
window.addEventListener('popstate', ()=>{
  if(!STATE.user) return;
  if(STATE.route!=='dash'){ STATE.route='dash'; STATE.sidebarOpen=false; renderApp(); history.pushState({route:'dash'},''); }
});

/* PWA service worker (inline, offline cache) */
if('serviceWorker' in navigator){
  const sw = `self.addEventListener('install',e=>self.skipWaiting());
    self.addEventListener('activate',e=>self.clients.claim());
    self.addEventListener('fetch',e=>{ e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))); });`;
  try{ const blob=new Blob([sw],{type:'text/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{}); }catch(e){}
}
</script>
