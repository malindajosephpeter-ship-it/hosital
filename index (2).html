<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#2a1840">
<title>JM House of Fashion — Mfumo wa Biashara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
/* ===== FONTS (embedded via Google Fonts CDN fallback to system) ===== */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Outfit:wght@300;400;500;600;700&display=swap');

/* ===== THEME VARIABLES ===== */
:root {
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;

  /* Zambarau palette */
  --violet-50: #f5f0fb;
  --violet-100: #e9ddf7;
  --violet-200: #d2bbef;
  --violet-300: #b48ce3;
  --violet-400: #9560d4;
  --violet-500: #7c3fc4;
  --violet-600: #6a2db0;
  --violet-700: #56248f;
  --violet-800: #3f1a6b;
  --violet-900: #2a1840;
  --gold: #e7b84f;
  --rose: #e98aae;

  --ok: #34d399;
  --warn: #fbbf24;
  --danger: #f87171;
  --info: #60a5fa;
}

/* DARK (default) */
[data-theme="dark"] {
  --bg: #160c24;
  --bg-2: #1d1130;
  --surface: #241640;
  --surface-2: #2d1c4e;
  --surface-3: #382561;
  --border: #3a2860;
  --border-soft: #2c1d4d;
  --text: #f3eefb;
  --text-2: #c4b3e0;
  --text-3: #8d7bb0;
  --accent: var(--violet-400);
  --accent-strong: var(--violet-300);
  --shadow: 0 20px 50px -20px rgba(0,0,0,.7);
  --glow: 0 0 40px -8px rgba(149,96,212,.5);
}

/* LIGHT */
[data-theme="light"] {
  --bg: #f6f2fc;
  --bg-2: #ece3f8;
  --surface: #ffffff;
  --surface-2: #f7f2fd;
  --surface-3: #efe6fb;
  --border: #e0d2f3;
  --border-soft: #ece0f8;
  --text: #2a1840;
  --text-2: #5a4880;
  --text-3: #9384b0;
  --accent: var(--violet-600);
  --accent-strong: var(--violet-700);
  --shadow: 0 20px 50px -24px rgba(80,40,140,.28);
  --glow: 0 0 36px -10px rgba(124,63,196,.35);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
  transition: background .4s ease, color .3s ease;
}
::-webkit-scrollbar { width:10px; height:10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius:10px; border:2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--violet-500); }
input, select, textarea, button { font-family: inherit; font-size: inherit; color: inherit; }
button { cursor:pointer; border:none; background:none; }
a { color: var(--accent); text-decoration:none; }
.hidden { display:none !important; }

/* ===== ATMOSPHERIC BACKGROUND ===== */
.bg-orbs { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.orb { position:absolute; border-radius:50%; filter: blur(80px); opacity:.5; }
.orb.o1 { width:380px;height:380px; background:radial-gradient(circle,#7c3fc4,transparent 70%); top:-120px; left:-80px; animation:float1 18s ease-in-out infinite; }
.orb.o2 { width:300px;height:300px; background:radial-gradient(circle,#e98aae,transparent 70%); bottom:-100px; right:-60px; opacity:.32; animation:float2 22s ease-in-out infinite; }
.orb.o3 { width:260px;height:260px; background:radial-gradient(circle,#e7b84f,transparent 70%); top:40%; right:20%; opacity:.18; animation:float1 26s ease-in-out infinite reverse; }
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

/* ===== ANIMATED LOGO ===== */
.jm-logo { display:inline-flex; align-items:center; gap:.7rem; }
.jm-mark { position:relative; width:var(--ms,52px); height:var(--ms,52px); flex-shrink:0; }
.jm-mark svg { width:100%; height:100%; display:block; }
.jm-ring { transform-origin:center; animation:spin 14s linear infinite; }
.jm-ring2 { transform-origin:center; animation:spin 9s linear infinite reverse; }
@keyframes spin { to { transform:rotate(360deg); } }
.jm-needle { transform-origin:50% 50%; animation:sway 3.5s ease-in-out infinite; }
@keyframes sway { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
.jm-text { display:flex; flex-direction:column; line-height:1; }
.jm-text b { font-family:var(--font-display); font-weight:900; font-size:var(--ts,1.25rem); letter-spacing:-.01em; background:linear-gradient(120deg,var(--violet-200),#fff 40%,var(--gold)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
[data-theme="light"] .jm-text b { background:linear-gradient(120deg,var(--violet-700),var(--violet-500),var(--gold)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.jm-text span { font-size:.62rem; letter-spacing:.32em; text-transform:uppercase; color:var(--text-3); margin-top:.28rem; font-weight:600; }

/* ===== LOGIN ===== */
.login-wrap { position:relative; z-index:2; min-height:100vh; display:grid; place-items:center; padding:1.2rem; }
.login-card { width:100%; max-width:410px; background:linear-gradient(160deg,var(--surface),var(--bg-2)); border:1px solid var(--border); border-radius:28px; padding:2.6rem 2.1rem 2.2rem; box-shadow:var(--shadow); position:relative; overflow:hidden; animation:rise .7s cubic-bezier(.2,.8,.2,1); }
/* glassmorphism — transparent without losing the violet identity */
.login-card.glass { background:color-mix(in srgb, var(--surface) 60%, transparent); backdrop-filter:blur(22px) saturate(140%); -webkit-backdrop-filter:blur(22px) saturate(140%); border:1px solid color-mix(in srgb, var(--violet-300) 30%, transparent); }
.login-card::before { content:""; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,var(--violet-500),var(--rose),var(--gold)); z-index:3; }
@keyframes rise { from{opacity:0; transform:translateY(26px) scale(.97)} to{opacity:1;transform:none} }
.login-card.shake { animation:shake .45s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-9px)} 40%,80%{transform:translateX(9px)} }
.login-logo { display:flex; flex-direction:column; align-items:center; gap:1rem; margin-bottom:2rem; }
.login-logo .jm-mark { --ms:84px; filter:drop-shadow(0 8px 22px rgba(124,63,196,.45)); }
.login-title { font-family:var(--font-display); font-weight:900; font-size:1.7rem; text-align:center; }
.login-sub { text-align:center; color:var(--text-3); font-size:.85rem; margin-top:.2rem; }
.field { margin-bottom:1.1rem; }
.field label { display:block; font-size:.78rem; font-weight:600; color:var(--text-2); margin-bottom:.4rem; letter-spacing:.02em; }
.inp { width:100%; padding:.85rem 1rem; background:var(--bg); border:1px solid var(--border); border-radius:13px; transition:border .2s, box-shadow .2s; outline:none; }
.inp:focus { border-color:var(--violet-400); box-shadow:0 0 0 4px rgba(149,96,212,.18); }
.inp-sm { padding:.4rem .55rem; border-radius:9px; max-width:120px; font-size:.84rem; }
.stat-click { cursor:pointer; transition:transform .15s, box-shadow .2s; }
.stat-click:hover { transform:translateY(-2px); box-shadow:var(--glow); border-color:var(--violet-400); }
/* glow box: animated travelling light around the textbox border */
.glow-box { position:relative; border-radius:15px; padding:2px; }
.glow-box .inp { background:color-mix(in srgb, var(--bg) 65%, transparent); position:relative; z-index:2; }
.glow-box::before { content:""; position:absolute; inset:0; border-radius:15px; padding:2px;
  background:conic-gradient(from var(--ang,0deg), transparent 0deg, transparent 250deg, var(--violet-400) 300deg, var(--rose) 330deg, var(--gold) 360deg);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude;
  opacity:0; transition:opacity .3s; animation:spinAng 3s linear infinite; }
.glow-box:focus-within::before { opacity:1; }
@property --ang { syntax:'<angle>'; initial-value:0deg; inherits:false; }
@keyframes spinAng { to { --ang:360deg; } }
/* fallback for browsers without @property: simple rotating glow */
@supports not (background: conic-gradient(from var(--ang),red,red)) {
  .glow-box:focus-within { box-shadow:0 0 0 2px var(--violet-400), 0 0 22px -4px var(--violet-400); }
}
.login-btn span { position:relative; z-index:2; }
.login-btn { position:relative; overflow:hidden; }
.login-btn::after { content:""; position:absolute; top:0; left:-60%; width:50%; height:100%; background:linear-gradient(110deg,transparent,rgba(255,255,255,.35),transparent); transform:skewX(-18deg); animation:sheen 2.6s ease-in-out infinite; }
@keyframes sheen { 0%{left:-60%} 55%,100%{left:130%} }
.login-btn.loading { pointer-events:none; }
.login-btn.loading span { opacity:0; }
.login-btn.loading::before { content:""; position:absolute; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; z-index:3; }
.btn { display:inline-flex; align-items:center; justify-content:center; gap:.45rem; padding:.6rem 1rem; border-radius:11px; font-weight:600; font-size:.88rem; transition:transform .15s, box-shadow .2s, background .2s, opacity .2s; }
.btn:active { transform:scale(.97); }
.btn svg { width:16px; height:16px; }
.btn-primary { background:linear-gradient(120deg,var(--violet-600),var(--violet-500)); color:#fff; box-shadow:0 8px 20px -12px rgba(124,63,196,.8); }
.btn-primary:hover { box-shadow:0 12px 26px -12px rgba(124,63,196,.95); }
.btn-ghost { background:var(--surface-2); border:1px solid var(--border); color:var(--text); }
.btn-ghost:hover { background:var(--surface-3); }
.btn-sm { padding:.45rem .75rem; font-size:.8rem; border-radius:9px; }
.btn-sm svg { width:14px; height:14px; }
.btn-block { width:100%; }
.btn-danger { background:rgba(248,113,113,.14); color:var(--danger); border:1px solid rgba(248,113,113,.3); }
.btn-row { display:flex; gap:.5rem; flex-wrap:wrap; }
/* login button stays full width */
.login-card .btn-primary { width:100%; padding:.85rem 1.3rem; font-size:.95rem; }
/* modal footer buttons are compact by default */
.modal-f .btn { padding:.5rem .9rem; font-size:.84rem; }
/* compact action buttons in toolbars & card headers */
.toolbar .btn, .card-h .btn { padding:.5rem .85rem; font-size:.83rem; }
@media (max-width:560px){
  /* on phones, action buttons with icons collapse to icon-only to save space */
  .toolbar .btn-sm .btn-label, .card-h .btn-sm .btn-label { display:none; }
  .toolbar .btn-sm, .card-h .btn-sm { padding:.5rem .6rem; }
}
.login-hint { margin-top:1.3rem; padding:.7rem .9rem; background:var(--surface-2); border-radius:11px; font-size:.76rem; color:var(--text-3); text-align:center; }
.login-err { background:rgba(248,113,113,.14); color:var(--danger); padding:.6rem .9rem; border-radius:11px; font-size:.82rem; margin-bottom:1rem; text-align:center; }

/* ===== APP LAYOUT ===== */
.shell { position:relative; z-index:2; display:flex; min-height:100vh; }
.sidebar { width:248px; flex-shrink:0; background:linear-gradient(180deg,var(--surface),var(--bg-2)); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; bottom:0; left:0; z-index:50; transition:transform .3s ease; }
.sb-head { padding:1.3rem 1.2rem; border-bottom:1px solid var(--border-soft); }
.sb-nav { flex:1; overflow-y:auto; padding:.8rem .7rem; }
.nav-group-label { font-size:.66rem; text-transform:uppercase; letter-spacing:.18em; color:var(--text-3); padding:.9rem .8rem .4rem; font-weight:700; }
.nav-item { display:flex; align-items:center; gap:.8rem; padding:.7rem .8rem; border-radius:11px; color:var(--text-2); font-weight:500; font-size:.9rem; transition:background .18s, color .18s; margin-bottom:.15rem; width:100%; text-align:left; }
.nav-item svg { width:19px; height:19px; flex-shrink:0; }
.nav-item:hover { background:var(--surface-2); color:var(--text); }
.nav-item.active { background:linear-gradient(120deg,var(--violet-600),var(--violet-500)); color:#fff; box-shadow:0 8px 18px -10px rgba(124,63,196,.9); }
.nav-item .badge { margin-left:auto; background:var(--rose); color:#fff; font-size:.66rem; font-weight:700; padding:.1rem .42rem; border-radius:20px; }
.sb-foot { padding:.9rem; border-top:1px solid var(--border-soft); }
.user-chip { display:flex; align-items:center; gap:.7rem; padding:.6rem; border-radius:12px; background:var(--surface-2); }
.avatar { width:38px;height:38px; border-radius:50%; background:linear-gradient(135deg,var(--violet-500),var(--rose)); display:grid; place-items:center; color:#fff; font-weight:700; flex-shrink:0; }
.user-chip .nm { font-size:.84rem; font-weight:600; }
.user-chip .rl { font-size:.7rem; color:var(--text-3); }

.main { flex:1; margin-left:248px; min-width:0; display:flex; flex-direction:column; }
.topbar { position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:1rem; padding:.85rem 1.4rem; background:color-mix(in srgb, var(--bg) 80%, transparent); backdrop-filter:blur(14px); border-bottom:1px solid var(--border-soft); }
.topbar h1 { font-family:var(--font-display); font-size:1.35rem; font-weight:900; }
.topbar .crumb { font-size:.74rem; color:var(--text-3); }
.tb-actions { margin-left:auto; display:flex; align-items:center; gap:.6rem; }
.chat-blink { animation:chatBlink 1.2s ease-in-out infinite; color:var(--rose); }
@keyframes chatBlink { 0%,100%{box-shadow:0 0 0 0 rgba(233,138,174,.5); border-color:var(--rose)} 50%{box-shadow:0 0 0 6px rgba(233,138,174,0); border-color:var(--border)} }
.icon-btn { width:40px;height:40px; border-radius:12px; background:var(--surface-2); border:1px solid var(--border); display:grid; place-items:center; color:var(--text-2); transition:.18s; position:relative; }
.icon-btn:hover { background:var(--surface-3); color:var(--text); }
.icon-btn svg { width:19px;height:19px; }
.dot { position:absolute; top:8px; right:9px; width:8px;height:8px; border-radius:50%; background:var(--rose); border:2px solid var(--bg); }
.menu-toggle { display:none; }
.content { padding:1.5rem 1.4rem 4rem; max-width:1500px; width:100%; }
.page { animation:fade .35s ease; }
@keyframes fade { from{opacity:0; transform:translateY(8px)} to{opacity:1;transform:none} }

/* ===== CARDS / STATS ===== */
.grid { display:grid; gap:.9rem; }
.stat-grid { grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); }
.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.2rem; box-shadow:var(--shadow); }
.stat { position:relative; overflow:hidden; padding:.95rem 1.05rem; display:flex; align-items:center; gap:.85rem; background:color-mix(in srgb, var(--surface) 55%, transparent); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid color-mix(in srgb, var(--violet-300) 22%, transparent); }
.stat .s-ic { width:38px; height:38px; border-radius:11px; flex-shrink:0; display:grid; place-items:center; background:color-mix(in srgb,var(--accent) 16%,transparent); color:var(--accent-strong); }
.stat .s-ic svg { width:18px; height:18px; }
.stat .s-body { min-width:0; flex:1; }
.stat .lbl { font-size:.72rem; color:var(--text-3); font-weight:600; letter-spacing:.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.stat .val { font-family:var(--font-display); font-size:1.18rem; font-weight:800; margin-top:.12rem; letter-spacing:-.01em; line-height:1.15; }
.stat .sub { font-size:.68rem; margin-top:.15rem; color:var(--text-3); }
.stat .sub.up { color:var(--ok); } .stat .sub.down { color:var(--danger); }
.card-h { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; gap:1rem; flex-wrap:wrap; }
.card-h h3 { font-family:var(--font-display); font-size:1.08rem; font-weight:700; }
.section-title { font-family:var(--font-display); font-size:1rem; font-weight:700; margin:1.6rem 0 .8rem; color:var(--text-2); }

/* ===== TABLE ===== */
.tbl-wrap { overflow-x:auto; border-radius:14px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:.86rem; }
th { text-align:left; padding:.8rem 1rem; background:var(--surface-2); color:var(--text-3); font-weight:600; font-size:.74rem; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; border-bottom:1px solid var(--border); }
td { padding:.75rem 1rem; border-bottom:1px solid var(--border-soft); white-space:nowrap; }
tr:last-child td { border-bottom:none; }
tbody tr { transition:background .15s; }
tbody tr:hover { background:var(--surface-2); }
.tr-clk { cursor:pointer; }
.pill { display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .6rem; border-radius:20px; font-size:.72rem; font-weight:600; }
.pill.ok { background:rgba(52,211,153,.16); color:var(--ok); }
.pill.warn { background:rgba(251,191,36,.16); color:var(--warn); }
.pill.danger { background:rgba(248,113,113,.16); color:var(--danger); }
.pill.info { background:rgba(96,165,250,.16); color:var(--info); }
.pill.muted { background:var(--surface-3); color:var(--text-3); }

/* ===== FORMS ===== */
.form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:.9rem; }
.form-grid .full { grid-column:1/-1; }
textarea.inp { resize:vertical; min-height:70px; }
.toolbar { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin-bottom:1rem; }
.search { flex:1; min-width:160px; position:relative; }
.search svg { position:absolute; left:.8rem; top:50%; transform:translateY(-50%); width:17px;height:17px; color:var(--text-3); }
.search .inp { padding-left:2.4rem; }
.chip-row { display:flex; gap:.4rem; flex-wrap:wrap; }
.chip { padding:.4rem .8rem; border-radius:20px; background:var(--surface-2); border:1px solid var(--border); font-size:.8rem; font-weight:500; color:var(--text-2); transition:.15s; }
.chip.active { background:var(--violet-500); color:#fff; border-color:var(--violet-500); }

/* ===== MODAL ===== */
.modal-bg { position:fixed; inset:0; z-index:200; background:rgba(10,5,20,.6); backdrop-filter:blur(5px); display:grid; place-items:center; padding:1rem; animation:fade .2s; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:22px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); animation:rise .3s cubic-bezier(.2,.8,.2,1); }
.modal.lg { max-width:820px; }
.modal-h { display:flex; align-items:center; justify-content:space-between; padding:1.3rem 1.5rem; border-bottom:1px solid var(--border-soft); position:sticky; top:0; background:var(--surface); z-index:2; }
.modal-h h3 { font-family:var(--font-display); font-size:1.2rem; font-weight:700; }
.modal-b { padding:1.5rem; }
.modal-f { padding:1rem 1.5rem; border-top:1px solid var(--border-soft); display:flex; gap:.6rem; justify-content:flex-end; position:sticky; bottom:0; background:var(--surface); }
/* transparent glass modal */
.modal.glass { background:color-mix(in srgb, var(--surface) 62%, transparent); backdrop-filter:blur(24px) saturate(135%); -webkit-backdrop-filter:blur(24px) saturate(135%); border:1px solid color-mix(in srgb, var(--violet-300) 28%, transparent); }
.modal.glass .modal-h, .modal.glass .modal-f { background:transparent; }

/* ===== POS ===== */
.pos { display:grid; grid-template-columns:1fr 360px; gap:1.1rem; height:calc(100vh - 140px); }
.pos-products { overflow-y:auto; padding-right:.4rem; }
.prod-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(135px,1fr)); gap:.8rem; }
.prod-card { background:var(--surface); border:1px solid var(--border); border-radius:15px; padding:.9rem; cursor:pointer; transition:.18s; text-align:left; }
.prod-card:hover { border-color:var(--violet-400); transform:translateY(-2px); box-shadow:var(--glow); }
.prod-card .thumb { width:100%; aspect-ratio:1; border-radius:11px; background:linear-gradient(135deg,var(--surface-3),var(--surface-2)); display:grid; place-items:center; font-size:1.8rem; margin-bottom:.6rem; }
.prod-card .pn { font-size:.82rem; font-weight:600; line-height:1.25; }
.prod-card .pp { font-size:.86rem; font-weight:700; color:var(--accent-strong); margin-top:.3rem; }
.prod-card .ps { font-size:.68rem; color:var(--text-3); }
.cart { background:var(--surface); border:1px solid var(--border); border-radius:18px; display:flex; flex-direction:column; overflow:hidden; }
.cart-items { flex:1; overflow-y:auto; padding:.9rem; }
.cart-row { display:flex; align-items:center; gap:.6rem; padding:.6rem 0; border-bottom:1px solid var(--border-soft); }
.cart-row .ci-n { flex:1; font-size:.84rem; font-weight:500; }
.qty { display:flex; align-items:center; gap:.4rem; }
.qty button { width:26px;height:26px; border-radius:8px; background:var(--surface-2); border:1px solid var(--border); font-weight:700; display:grid; place-items:center; }
.cart-foot { padding:1rem; border-top:1px solid var(--border); background:var(--surface-2); }
.cart-line { display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:.4rem; color:var(--text-2); }
.cart-total { display:flex; justify-content:space-between; font-family:var(--font-display); font-size:1.3rem; font-weight:900; margin:.6rem 0 1rem; }
.empty { text-align:center; padding:2.5rem 1rem; color:var(--text-3); }
.empty svg { width:46px;height:46px; opacity:.4; margin-bottom:.6rem; }

/* ===== RECEIPT / REPORT PRINT ===== */
.receipt { font-family:'Outfit',monospace; max-width:320px; margin:0 auto; color:#111; background:#fff; padding:1.4rem; border-radius:12px; }
.receipt h2 { text-align:center; font-family:var(--font-display); }
.receipt .r-line { display:flex; justify-content:space-between; font-size:.82rem; padding:.2rem 0; }
.receipt hr { border:none; border-top:1px dashed #aaa; margin:.6rem 0; }

/* report cards */
.report-hero { background:linear-gradient(135deg,var(--violet-700),var(--violet-900)); border-radius:22px; padding:1.8rem; color:#fff; position:relative; overflow:hidden; margin-bottom:1.2rem; }
.report-hero::after { content:""; position:absolute; right:-40px;bottom:-40px; width:180px;height:180px; border-radius:50%; background:rgba(255,255,255,.06); }
.report-hero h2 { font-family:var(--font-display); font-size:1.6rem; font-weight:900; }
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:1rem; margin-top:1.3rem; position:relative; z-index:2; }
.kpi { background:rgba(255,255,255,.1); border-radius:14px; padding:.9rem; backdrop-filter:blur(4px); }
.kpi .k-l { font-size:.72rem; opacity:.8; } .kpi .k-v { font-family:var(--font-display); font-size:1.3rem; font-weight:900; margin-top:.2rem; }
.bar-chart { display:flex; align-items:flex-end; gap:.5rem; height:170px; padding-top:1rem; }
.bar { flex:1; background:linear-gradient(180deg,var(--violet-400),var(--violet-600)); border-radius:7px 7px 0 0; min-height:4px; position:relative; transition:height .6s cubic-bezier(.2,.8,.2,1); }
.bar:hover { filter:brightness(1.15); }
.bar .b-lbl { position:absolute; bottom:-1.3rem; left:0; right:0; text-align:center; font-size:.66rem; color:var(--text-3); }
.bar .b-val { position:absolute; top:-1.3rem; left:0;right:0; text-align:center; font-size:.66rem; font-weight:700; color:var(--text-2); }
.chart-wrap { padding-bottom:1.5rem; }

/* misc */
.toast-wrap { position:fixed; bottom:1.4rem; left:50%; transform:translateX(-50%); z-index:500; display:flex; flex-direction:column; gap:.5rem; align-items:center; }
.toast { background:var(--surface-3); border:1px solid var(--border); color:var(--text); padding:.8rem 1.3rem; border-radius:13px; box-shadow:var(--shadow); font-size:.86rem; font-weight:500; animation:rise .3s; display:flex; align-items:center; gap:.6rem; }
.toast.ok { border-color:var(--ok); } .toast.err { border-color:var(--danger); }
.tag { font-size:.72rem; padding:.15rem .5rem; border-radius:7px; background:var(--surface-3); color:var(--text-2); font-weight:600; }
.mini { font-size:.78rem; color:var(--text-3); }
.divider { height:1px; background:var(--border-soft); margin:1.2rem 0; }
.flex { display:flex; } .between { justify-content:space-between; } .center { align-items:center; } .gap { gap:.6rem; } .wrap { flex-wrap:wrap; }
.mt { margin-top:1rem; } .mb { margin-bottom:1rem; }
.txt-r { text-align:right; } .txt-c { text-align:center; }
.fw7 { font-weight:700; } .accent { color:var(--accent-strong); }
.ok-t { color:var(--ok); } .danger-t { color:var(--danger); } .warn-t { color:var(--warn); }

/* ===== RESPONSIVE ===== */
@media (max-width:900px){
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:none; }
  .main { margin-left:0; }
  .menu-toggle { display:grid; }
  .pos { grid-template-columns:1fr; height:auto; }
  .cart { position:fixed; bottom:0; left:0; right:0; max-height:55vh; border-radius:18px 18px 0 0; z-index:60; transform:translateY(calc(100% - 60px)); transition:transform .3s; }
  .cart.open { transform:none; }
  .sb-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:49; }
}
@media (max-width:560px){
  .content { padding:1rem .9rem 5rem; }
  .stat .val { font-size:1.5rem; }
}

.chat-wrap2 { display:grid; grid-template-columns:240px 1fr; gap:1.1rem; height:calc(100vh - 150px); }
.chat-rooms { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:.7rem; overflow-y:auto; }
.room-item { display:flex; align-items:center; gap:.6rem; padding:.7rem .8rem; border-radius:11px; width:100%; text-align:left; color:var(--text-2); font-weight:500; transition:.15s; margin-bottom:.2rem; }

.room-item.active { background:linear-gradient(120deg,var(--violet-600),var(--violet-500)); color:#fff; }

.room-item.active .r-ava { background:rgba(255,255,255,.2); }
.chat-main { background:var(--surface); border:1px solid var(--border); border-radius:18px; display:flex; flex-direction:column; overflow:hidden; }
.chat-head { padding:1rem 1.2rem; border-bottom:1px solid var(--border-soft); display:flex; align-items:center; gap:.7rem; }
.chat-body { flex:1; overflow-y:auto; padding:1.2rem; display:flex; flex-direction:column; gap:.6rem; }
.msg { max-width:72%; padding:.6rem .9rem; border-radius:15px; font-size:.88rem; line-height:1.4; position:relative; }
.msg .m-who { font-size:.7rem; font-weight:700; color:var(--accent-strong); margin-bottom:.15rem; }
.msg .m-time { font-size:.62rem; opacity:.6; margin-top:.2rem; text-align:right; }
.msg.them { background:var(--surface-2); border:1px solid var(--border-soft); align-self:flex-start; border-bottom-left-radius:4px; }
.msg.me { background:linear-gradient(120deg,var(--violet-600),var(--violet-500)); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.msg.me .m-who { color:rgba(255,255,255,.85); }
.chat-input { padding:.8rem; border-top:1px solid var(--border); display:flex; gap:.6rem; align-items:flex-end; }
.chat-input textarea { flex:1; resize:none; max-height:100px; min-height:44px; padding:.7rem .9rem; background:var(--bg); border:1px solid var(--border); border-radius:13px; outline:none; }
.chat-input textarea:focus { border-color:var(--violet-400); }
.send-btn { width:46px;height:46px;border-radius:13px; background:linear-gradient(120deg,var(--violet-600),var(--violet-500)); color:#fff; display:grid;place-items:center; flex-shrink:0; transition:transform .15s; }
.send-btn:active { transform:scale(.92); }
.send-btn svg { width:20px;height:20px; }
.msg .m-meta { display:flex; align-items:center; gap:.5rem; justify-content:flex-end; margin-top:.25rem; }
.msg .m-read { font-size:.6rem; opacity:.8; }
.msg .m-unread { font-size:.6rem; font-weight:700; color:var(--gold); animation:blinkUnread 1.3s ease-in-out infinite; }
.msg.them .m-unread { color:var(--rose); }
@keyframes blinkUnread { 0%,100%{opacity:1} 50%{opacity:.35} }
.msg .m-del { width:20px; height:20px; border-radius:6px; background:rgba(255,255,255,.15); color:inherit; display:grid; place-items:center; opacity:.6; }
.msg.them .m-del { background:var(--surface-3); }
.msg .m-del:hover { opacity:1; }
.msg .m-del svg { width:12px; height:12px; }
.unread-badge { background:var(--rose); color:#fff; font-size:.66rem; font-weight:800; min-width:20px; height:20px; padding:0 5px; border-radius:20px; display:grid; place-items:center; animation:popIn .3s, glowPulse 1.6s ease-in-out infinite; }
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
@keyframes glowPulse { 0%,100%{box-shadow:0 0 0 0 rgba(233,138,174,.5)} 50%{box-shadow:0 0 0 5px rgba(233,138,174,0)} }
.new-sms-banner { width:100%; display:flex; align-items:center; gap:.7rem; padding:.85rem 1.1rem; margin-bottom:1rem; border-radius:14px; text-align:left;
  background:linear-gradient(120deg,color-mix(in srgb,var(--rose) 22%,transparent),color-mix(in srgb,var(--violet-500) 22%,transparent));
  border:1px solid color-mix(in srgb,var(--rose) 40%,transparent); color:var(--text); font-size:.9rem;
  animation:bannerSlide .5s, bannerGlow 2s ease-in-out infinite; }
.new-sms-banner svg { width:20px; height:20px; color:var(--rose); flex-shrink:0; }

.new-sms-banner > span:nth-child(2){ flex:1; }
.new-sms-banner .ns-pulse { background:var(--rose); color:#fff; font-weight:800; min-width:24px; height:24px; padding:0 6px; border-radius:20px; display:grid; place-items:center; animation:glowPulse 1.4s infinite; }
@keyframes bannerSlide { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
@keyframes bannerGlow { 0%,100%{border-color:color-mix(in srgb,var(--rose) 40%,transparent)} 50%{border-color:color-mix(in srgb,var(--rose) 75%,transparent)} }
.bc-list { display:flex; flex-direction:column; gap:.4rem; margin-top:.8rem; max-height:280px; overflow-y:auto; }
.bc-row { display:flex; align-items:center; justify-content:space-between; gap:.6rem; padding:.5rem .7rem; background:var(--surface-2); border-radius:10px; }
.po-line { display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:.5rem; align-items:center; margin-bottom:.5rem; }
.po-line .inp { padding:.5rem .6rem; }
@media (max-width:760px){ .chat-wrap2 { grid-template-columns:1fr; height:auto; } .chat-rooms { display:flex; gap:.5rem; overflow-x:auto; } .room-item { flex-shrink:0; } .chat-main { height:65vh; } .po-line { grid-template-columns:1fr 1fr; } }

/* ===== PRODUCT IMAGES / SLIDES ===== */
.prod-card { background:var(--surface); border:1px solid var(--border); border-radius:15px; padding:.9rem; cursor:pointer; transition:.18s; text-align:left; position:relative; }
.prod-card.oos { opacity:.5; }

.inv-thumb img { width:100%; height:100%; object-fit:cover; }
.inv-thumb span { font-size:1.2rem; }

.pp-gallery { width:100%; aspect-ratio:4/3; border-radius:14px; overflow:hidden; background:var(--surface-2); position:relative; display:grid; place-items:center; }

.pp-gallery img.on { opacity:1; }

.pp-thumbs { display:flex; gap:.5rem; margin-top:.6rem; flex-wrap:wrap; }

.feed-row { display:flex; align-items:center; gap:.8rem; padding:.6rem 0; border-bottom:1px solid var(--border-soft); }
.feed-row:last-child { border-bottom:none; }

.feed-ic.in { background:rgba(52,211,153,.16); color:var(--ok); }
.feed-ic.out { background:rgba(248,113,113,.16); color:var(--danger); }

/* ===== DUAL BAR CHART ===== */

.bar-pair { flex:1; display:flex; align-items:flex-end; justify-content:center; gap:3px; position:relative; height:100%; }
.bar-pair .bar { flex:1; max-width:18px; }
.bar.buy { background:linear-gradient(180deg,var(--rose),#c2607f) !important; }
.bar-pair .b-lbl { position:absolute; bottom:-1.3rem; left:0; right:0; text-align:center; font-size:.62rem; color:var(--text-3); white-space:nowrap; }
.bar-pair .b-val { font-size:.6rem; }
.leg-dot { width:10px; height:10px; border-radius:3px; display:inline-block; margin:0 .25rem 0 .5rem; }
.leg-dot.sale { background:var(--violet-500); }
.leg-dot.buy { background:var(--rose); }

/* ===== NOTIFICATIONS ===== */
.notif-sec { margin-bottom:1.1rem; }
.notif-h { display:flex; align-items:center; justify-content:space-between; padding:.5rem .7rem; border-radius:10px; background:var(--surface-2); margin-bottom:.5rem; }
.notif-h.danger { background:rgba(248,113,113,.1); } .notif-h.warn { background:rgba(251,191,36,.1); }
.notif-h.info { background:rgba(96,165,250,.1); } .notif-h.ok { background:rgba(52,211,153,.1); }
.notif-row { display:flex; align-items:center; justify-content:space-between; padding:.4rem .2rem; border-bottom:1px solid var(--border-soft); }
.notif-row:last-child { border-bottom:none; }

/* PRINT */
@media print {
  .bg-orbs, .sidebar, .topbar, .toolbar, .modal-f, .no-print { display:none !important; }
  .main { margin:0; } .content { padding:0; }
  body { background:#fff; color:#000; }
  .card, .report-hero { box-shadow:none; border:1px solid #ccc; color:#000; }
  .report-hero { background:#3f1a6b !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
}

/* ---------- CLOUD SYNC (shared across all devices via /api/state) ---------- */
const CLOUD = { rev:0, dirty:false, busy:false, ready:false, timer:null };

function cloudBadge(state){
  let b=document.getElementById('cloudBadge');
  if(!b){
    b=document.createElement('div'); b.id='cloudBadge';
    b.style.cssText='position:fixed;bottom:12px;right:12px;z-index:99999;font:600 11px system-ui,sans-serif;'
      +'padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:6px;'
      +'box-shadow:0 2px 10px rgba(0,0,0,.3);pointer-events:none;transition:opacity .35s;opacity:0';
    document.body.appendChild(b);
  }
  const map={
    ok:['#13321f','#34d399','☁ Imehifadhiwa winguni'],
    pending:['#33300f','#fbbf24','⟳ Inahifadhi…'],
    err:['#3a1515','#f87171','⚠ Hakuna mtandao – itahifadhiwa']
  };
  const m=map[state]||map.ok;
  b.style.background=m[0]; b.style.color=m[1]; b.textContent=m[2]; b.style.opacity='1';
  clearTimeout(b._t);
  if(state==='ok') b._t=setTimeout(()=>{ b.style.opacity='0'; }, 2400);
}

function applyMigrations(){
  if(!DB.purchaseOrders) DB.purchaseOrders=[];
  if(!DB.chat) DB.chat=[];
  if(DB.counters && !DB.counters.po) DB.counters.po=2001;
}

async function cloudPull(){
  try{
    const r = await fetch('/api/state', { cache:'no-store' });
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

async function cloudPush(){
  if(CLOUD.busy){ return; }
  CLOUD.busy=true;
  try{
    const r = await fetch('/api/state', {
      method:'PUT',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ data: DB })
    });
    if(r.ok){
      const j = await r.json();
      CLOUD.rev = j.rev||CLOUD.rev;
      CLOUD.dirty=false;
      cloudBadge('ok');
    } else { cloudBadge('err'); }
  }catch(e){ cloudBadge('err'); }
  CLOUD.busy=false;
  if(CLOUD.dirty) cloudSchedule();
}

function cloudSchedule(){
  if(!CLOUD.ready) return;            // don't push until first sync settled
  CLOUD.dirty=true;
  cloudBadge('pending');
  clearTimeout(CLOUD.timer);
  CLOUD.timer=setTimeout(cloudPush, 700);
}

function rerender(){ if(STATE.user) renderApp(); else renderLogin(); }

async function cloudInit(){
  const remote = await cloudPull();
  if(remote && remote.data){
    // A shared copy already exists -> adopt it as the source of truth.
    CLOUD.rev = remote.rev||0;
    DB = remote.data; applyMigrations();
    try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch(e){}
    CLOUD.ready=true; rerender(); cloudBadge('ok');
  } else if(remote){
    // Reachable, but no shared copy yet -> seed it with this device's data.
    CLOUD.ready=true; await cloudPush();
  } else {
    // Offline / API unreachable -> keep working from local cache, retry later.
    CLOUD.ready=true; cloudBadge('err');
  }
  cloudPoll();
}

function cloudPoll(){
  setInterval(async ()=>{
    if(CLOUD.dirty || CLOUD.busy) return;       // never overwrite unsynced local edits
    const remote = await cloudPull();
    if(remote && remote.data && (remote.rev||0) > CLOUD.rev){
      CLOUD.rev = remote.rev;
      DB = remote.data; applyMigrations();
      try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch(e){}
      rerender();
      toast('Taarifa zimesasishwa kutoka kifaa kingine','info');
    }
  }, 15000);
}

/* ---------- MODAL ---------- */
function modal(title, bodyHTML, footHTML, opts={}){
  const bg = document.createElement('div');
  bg.className='modal-bg';
  bg.innerHTML = `<div class="modal ${opts.lg?'lg':''} ${opts.glass?'glass':''}">
    <div class="modal-h"><h3>${title}</h3><button class="icon-btn" style="width:34px;height:34px;" data-close>${I.x}</button></div>
    <div class="modal-b">${bodyHTML}</div>
    ${footHTML?`<div class="modal-f">${footHTML}</div>`:''}
  </div>`;
  document.body.appendChild(bg);
  const close = ()=> bg.remove();
  bg.querySelectorAll('[data-close]').forEach(b=> b.onclick = close);
  bg.onclick = e => { if(e.target===bg) close(); };
  return { el:bg, close };
}
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function num(id){ return +val(id)||0; }

  const totalDebt = debtors.reduce((a,c)=>a+c.debt,0);
  const pendingPO = DB.purchaseOrders.filter(p=>p.status==='draft'||p.status==='sent');
  const suppOwed = DB.suppliers.filter(s=>s.balance>0);

  const sec = (title,count,inner,route,tone='') => `

    + (low.length>8?`<div class="mini mt">…na nyingine ${low.length-8}</div>`:''),
    canAccess('inventory')?'inventory':'', 'danger');

  if(debtors.length) html += sec('Wateja wanaodaiwa', debtors.length,

    canAccess('inventory')?'inventory':'', 'ok');

/* ---------- ANALYTICS HELPERS ---------- */
function salesBetween(from,to){ return DB.sales.filter(s=>s.date>=from && s.date<=to); }
function sumSales(arr){ return arr.reduce((a,s)=>a+s.total,0); }
function sumProfit(arr){ return arr.reduce((a,s)=>a+(s.profit||0),0); }
function monthStart(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10); }
function stockValue(){ return DB.products.filter(p=>p.active).reduce((a,p)=>a+p.cost*p.stock,0); }
/* unified transaction feed (for accountant live view) */
function txFeed(limit=40){
  const f=[];
  DB.sales.forEach(s=>f.push({ at:s.at, kind:'sale', dir:'in', label:'Mauzo '+s.rcpt, who:s.custName, amount:s.paid, method:s.method, extra:s.balance>0?('Deni '+fmt(s.balance)):'' }));
  DB.payments.forEach(p=>f.push({ at:p.at, kind:'cpay', dir:'in', label:'Malipo ya deni', who:p.custName, amount:p.amount, method:p.method, extra:'' }));
  DB.expenses.forEach(e=>f.push({ at:e.at, kind:'exp', dir:'out', label:'Matumizi: '+e.cat, who:e.note||'', amount:e.amount, method:'', extra:'' }));
  DB.purchaseOrders.filter(p=>p.received).forEach(p=>f.push({ at:p.receivedDate+'T12:00', kind:'po', dir:'out', label:'Manunuzi '+p.ref, who:p.suppName, amount:p.paid, method:'', extra:(p.total-p.paid)>0?('Deni '+fmt(p.total-p.paid)):'' }));
  return f.sort((a,b)=>(b.at||'').localeCompare(a.at||'')).slice(0,limit);
}

/* thumbnail: real images (slide) or emoji */
function prodThumb(p){
  if(p.images && p.images.length){
    return `<div class="thumb-slide" data-slide="${p.id}">${p.images.map((src,i)=>`<img src="${src}" class="${i===0?'on':''}" alt="">`).join('')}
      ${p.images.length>1?`<div class="slide-dots">${p.images.map((_,i)=>`<span class="${i===0?'on':''}"></span>`).join('')}</div>`:''}</div>`;
  }
  return `<span style="font-size:1.9rem">${p.emoji||'👗'}</span>`;
}
let _slideTimer=null;
function startThumbSlides(){
  if(_slideTimer) clearInterval(_slideTimer);
  _slideTimer = setInterval(()=>{
    document.querySelectorAll('.thumb-slide').forEach(box=>{
      const imgs=[...box.querySelectorAll('img')]; if(imgs.length<2) return;
      const dots=[...box.querySelectorAll('.slide-dots span')];
      let cur=imgs.findIndex(im=>im.classList.contains('on')); imgs[cur].classList.remove('on'); if(dots[cur])dots[cur].classList.remove('on');
      cur=(cur+1)%imgs.length; imgs[cur].classList.add('on'); if(dots[cur])dots[cur].classList.add('on');
    });
  }, 2200);
}

function cartRow(ci){

function cartFoot(){
  if(!STATE.cart.length) return '';
  const sub = STATE.cart.reduce((a,i)=>a+i.price*i.qty,0);

  return `<div class="cart-foot">

function addToCart(pid,el){
  const p = DB.products.find(x=>x.id===pid);
  if(!p) return;
  if(p.stock<=0){ toast('Bidhaa imeisha stoo','err'); return; }
  const ex = STATE.cart.find(c=>c.id===pid);
  if(ex){ if(ex.qty>=p.stock){ toast('Hakuna stoo ya kutosha','err'); return; } ex.qty++; }
  else STATE.cart.push({ id:pid, name:p.name, price:effPrice(p), cost:p.cost, qty:1 });
  pagePOS(el);
}
function chgQty(pid,d,el){
  const ci = STATE.cart.find(c=>c.id===pid); if(!ci) return;
  const p = DB.products.find(x=>x.id===pid);
  ci.qty += d;
  if(ci.qty<=0) STATE.cart = STATE.cart.filter(c=>c.id!==pid);
  else if(p && ci.qty>p.stock){ ci.qty=p.stock; toast('Umefika kikomo cha stoo','err'); }
  pagePOS(el);
}

    <div class="divider"></div>
    <div class="flex between"><span>Jumla ndogo</span><b>${fmt(sub)}</b></div>
    <div class="flex between" id="discRow" style="display:none"><span>Punguzo</span><b class="danger-t" id="discShow">- TZS 0</b></div>
    <div class="flex between mt"><span class="fw7">JUMLA YA KULIPA</span><b class="accent" id="coTotal" style="font-size:1.15rem">${fmt(sub)}</b></div>
  `, `<button class="btn btn-ghost" data-close>Ghairi</button><button class="btn btn-primary" id="coConfirm">Thibitisha & Chapisha</button>`, {});

  const calcDisc = ()=>{
    const raw = +document.getElementById('coDisc').value||0;
    const type = document.getElementById('coDiscType').value;
    let d = type==='pct' ? Math.round(sub*raw/100) : raw;
    return Math.min(Math.max(d,0), sub);
  };
  const upd = ()=>{
    const disc = calcDisc();
    const total = sub-disc;
    document.getElementById('coTotal').textContent = fmt(total);
    document.getElementById('discRow').style.display = disc>0?'flex':'none';
    document.getElementById('discShow').textContent = '- '+fmt(disc);
    const credit = document.getElementById('coCredit').value==='credit';
    document.getElementById('methodWrap').style.display = credit?'none':'block';
    document.getElementById('paidWrap').style.display = credit?'none':'block';
    if(!credit) document.getElementById('coPaid').value = total;
    return total;
  };
  ['coDisc','coDiscType','coCredit'].forEach(id=>{ const e=document.getElementById(id); e.oninput=upd; e.onchange=upd; });
  upd();
  document.getElementById('coConfirm').onclick = ()=>{
    const disc = calcDisc();
    const total = sub-disc;
    const credit = document.getElementById('coCredit').value==='credit';
    const method = credit ? 'Mkopo' : document.getElementById('coMethod').value;
    const custId = document.getElementById('coCust').value;
    const paid = credit ? 0 : (+document.getElementById('coPaid').value||0);
    if(credit && !custId){ toast('Chagua mteja kwa mauzo ya mkopo','err'); return; }
    finalizeSale({ sub, disc, total, method, custId, paid });
    m.close();
  };
}
function finalizeSale({sub,disc,total,method,custId,paid}){
  const profit = STATE.cart.reduce((a,i)=>a+(i.price-i.cost)*i.qty,0) - disc;
  const rcpt = DB.counters.rcpt++;
  const cust = custId ? DB.customers.find(c=>c.id===custId) : null;
  const balance = total - paid;
  const sale = {
    id:uid('sale'), rcpt:'RCT-'+rcpt, date:today(), at:now(),
    items:STATE.cart.map(i=>({name:i.name,qty:i.qty,price:i.price,cost:i.cost})),
    sub, disc, total, profit, method, paid, balance,
    custId:custId||null, custName:cust?cust.name:'Mteja wa kawaida', cashier:STATE.user.name
  };
  // reduce stock
  STATE.cart.forEach(i=>{ const p=DB.products.find(x=>x.id===i.id); if(p){ p.stock-=i.qty;
    DB.stockMoves.unshift({id:uid('sm'),pid:p.id,name:p.name,type:'Mauzo',qty:-i.qty,at:now(),by:STATE.user.name}); }});
  DB.sales.unshift(sale);
  if(cust){ cust.totalSpent+=total; cust.points+=Math.floor(total/1000*DB.settings.loyaltyRate);
    if(balance>0) cust.debt+=balance; }
  audit('Mauzo', sale.rcpt+' • '+fmt(total)+' • '+method);
  save();
  const savedCart = [...STATE.cart];
  STATE.cart=[]; STATE.cartCust=null;
  toast('Mauzo yamekamilika! '+sale.rcpt);
  showReceipt(sale, savedCart);
  renderApp();
}

/* compress uploaded image to keep localStorage small */
function compressImg(dataUrl, cb){
  const img=new Image();
  img.onload=()=>{ const max=620; let{width:w,height:h}=img;
    if(w>h&&w>max){ h=h*max/w; w=max; } else if(h>max){ w=w*max/h; h=max; }
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    try{ cb(cv.toDataURL('image/jpeg',0.72)); }catch(e){ cb(dataUrl); }
  };
  img.onerror=()=>cb(dataUrl);
  img.src=dataUrl;
}
function mkP2(name,cat,price,cost,stock,size,color,brand,emoji,barcode){
  return { id:uid('p'),name,cat,price,cost,stock,size,color,brand,emoji:emoji||'👗',images:[],promoPrice:0,promoEnd:'',barcode,active:true,created:now() };

  const p = DB.products.find(x=>x.id===pid);

        <option value="in">Ongeza (Manunuzi/GRN)</option><option value="out">Punguza (Haribika/Poteza)</option>
        <option value="set">Weka idadi kamili (Stock Count)</option></select></div>
      <div><label class="mini">Idadi</label><input class="inp" id="adjQty" type="number" value="0" inputmode="numeric"></div>
      <div class="full"><label class="mini">Sababu</label><input class="inp" id="adjNote" placeholder="mf. Manunuzi mapya, Imeharibika..."></div>
    </div>`,
    `<button class="btn btn-ghost" data-close>Ghairi</button><button class="btn btn-primary" id="adjSave">Hifadhi</button>`);
  document.getElementById('adjSave').onclick=()=>{
    const type=val('adjType'), qty=num('adjQty'), note=val('adjNote');
    if(qty<=0 && type!=='set'){ toast('Weka idadi','err'); return; }
    let delta=0;
    if(type==='in'){ p.stock+=qty; delta=qty; }
    else if(type==='out'){ p.stock=Math.max(0,p.stock-qty); delta=-qty; }
    else { delta=qty-p.stock; p.stock=qty; }
    DB.stockMoves.unshift({id:uid('sm'),pid:p.id,name:p.name,type:{in:'Ongezeko',out:'Punguzo',set:'Hesabu'}[type],qty:delta,note,at:now(),by:STATE.user.name});
    audit('Rekebisha stoo',p.name+' ('+delta+')'); save(); m.close(); toast('Stoo imerekebishwa'); pageInventory(el); refreshBadges();
  };
}

function supplierStatement(sid){
  const s = DB.suppliers.find(x=>x.id===sid);
  const s_set = DB.settings;
  const period = STATE.stmtPeriod || 'all';
  let from='0000-01-01', to='9999-12-31', plabel='Tangu mwanzo';
  const d=new Date();
  if(period==='month'){ from=monthStart(); to=today(); plabel='Mwezi huu'; }
  else if(period==='year'){ from=new Date(d.getFullYear(),0,1).toISOString().slice(0,10); to=today(); plabel='Mwaka '+d.getFullYear(); }
  else if(period==='last'){ const lm=new Date(d.getFullYear(),d.getMonth()-1,1); from=lm.toISOString().slice(0,10); to=new Date(d.getFullYear(),d.getMonth(),0).toISOString().slice(0,10); plabel='Mwezi uliopita'; }

  const allPos = DB.purchaseOrders.filter(p=>p.suppId===sid && p.received)
    .sort((a,b)=>(a.receivedDate||'').localeCompare(b.receivedDate||''));
  // opening balance = balance before "from"
  let opening=0;
  allPos.filter(p=>p.receivedDate<from).forEach(p=>{ opening += p.total - p.paid; });
  const pos = allPos.filter(p=>p.receivedDate>=from && p.receivedDate<=to);

  const rows=[]; let bal=opening;
  pos.forEach(p=>{
    bal += p.total;
    rows.push({ date:p.receivedDate, ref:p.ref, desc:'Manunuzi ('+p.items.length+' aina)', debit:p.total, credit:0, bal });
    if(p.paid>0){ bal -= p.paid;
      rows.push({ date:p.receivedDate, ref:p.ref, desc:'Malipo', debit:0, credit:p.paid, bal }); }
  });
  const totalBuy = pos.reduce((a,p)=>a+p.total,0);
  const totalPaid = pos.reduce((a,p)=>a+p.paid,0);

  const body = `<div class="toolbar no-print" style="margin-bottom:1rem">
      <div class="chip-row">
        ${[['all','Yote'],['year','Mwaka'],['month','Mwezi huu'],['last','Mwezi uliopita']].map(([k,l])=>`<button class="chip ${period===k?'active':''}" data-stmtp="${k}">${l}</button>`).join('')}
      </div></div>
    <div id="stmtDoc">
    <div class="flex between center mb">
      <div><b style="font-family:var(--font-display);font-size:1.3rem">${s_set.name}</b>
        <div class="mini">${s_set.location} • ${s_set.phone}</div></div>
      <div class="txt-r"><b style="font-size:1.05rem">TAARIFA YA MSAMBAZAJI</b>
        <div class="mini">${plabel} • ${dateSw(today())}</div></div>
    </div>
    <div class="card" style="padding:.9rem;margin-bottom:1rem">
      <div class="flex between"><span class="mini">Msambazaji</span><b>${s.name}</b></div>
      <div class="flex between mt"><span class="mini">Mawasiliano</span><span>${s.phone}${s.email?' • '+s.email:''}</span></div>
      ${s.address?`<div class="flex between mt"><span class="mini">Mahali</span><span>${s.address}</span></div>`:''}
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Tarehe</th><th>Kumb.</th><th>Maelezo</th><th class="txt-r">Deni</th><th class="txt-r">Malipo</th><th class="txt-r">Salio</th></tr></thead>
      <tbody>
        ${period!=='all'?`<tr><td colspan="5" class="mini">Salio la kuanzia (kabla ${dateSw(from)})</td><td class="txt-r fw7">${fmt(opening)}</td></tr>`:''}
        ${rows.length?rows.map(r=>`<tr>
        <td>${dateSw(r.date)}</td><td>${r.ref}</td><td>${r.desc}</td>
        <td class="txt-r">${r.debit?fmt(r.debit):'—'}</td>
        <td class="txt-r ok-t">${r.credit?fmt(r.credit):'—'}</td>
        <td class="txt-r fw7">${fmt(r.bal)}</td>
      </tr>`).join(''):'<tr><td colspan="6"><div class="empty">Hakuna miamala katika kipindi hiki</div></td></tr>'}</tbody>
      <tfoot>
        <tr><td colspan="3" class="txt-r fw7">JUMLA (kipindi hiki)</td><td class="txt-r fw7">${fmt(totalBuy)}</td><td class="txt-r fw7 ok-t">${fmt(totalPaid)}</td><td></td></tr>
        <tr><td colspan="5" class="txt-r fw7">SALIO LA DENI TUNALODAIWA SASA</td><td class="txt-r fw7 ${s.balance>0?'warn-t':'ok-t'}" style="font-size:1.05rem">${fmt(s.balance)}</td></tr>
      </tfoot>
    </table></div>
    <div class="mini mt txt-c" style="opacity:.7">Taarifa hii imetolewa na mfumo wa JM House of Fashion</div>
  </div>`;
  const wa = s.phone ? `<button class="btn btn-ghost btn-sm no-print" id="stmtWa">${I.wa} Tuma WhatsApp</button>` : '';
  const m = modal('Taarifa ya '+s.name, body,
    `${wa}<button class="btn btn-ghost" data-close>Funga</button><button class="btn btn-primary no-print" id="stmtPrint">${I.print} Chapisha</button>`,
    {lg:true});
  m.el.querySelectorAll('[data-stmtp]').forEach(b=>b.onclick=()=>{ STATE.stmtPeriod=b.dataset.stmtp; m.close(); supplierStatement(sid); });
  document.getElementById('stmtPrint').onclick=()=>printNode('stmtDoc','Taarifa - '+s.name);
  if(s.phone){ document.getElementById('stmtWa').onclick=()=>{
    const msg = `*${s_set.name}*%0ATaarifa ya Msambazaji: ${s.name} (${plabel})%0AManunuzi: ${fmt(totalBuy)}%0AImelipwa: ${fmt(totalPaid)}%0ASalio la deni: ${fmt(s.balance)}%0A%0AAsante.`;
    window.open(`https://wa.me/${s.phone.replace(/[^0-9]/g,'')}?text=${msg}`,'_blank');
  };}
}

function updatePOTotal(){ const t=STATE.poItems.reduce((a,l)=>a+(l.qty||0)*(l.cost||0),0); const e=document.getElementById('poTotal'); if(e) e.textContent=fmt(t); return t; }
function bindPOForm(m,el){
  renderPOLines(); updatePOTotal();

  const doSave = status => {

function poPayDebt(poId,el){
  const po = DB.purchaseOrders.find(p=>p.id===poId);
  const bal = po.total - po.paid;
  const m = modal('Lipa Deni — '+po.ref, `
    <div class="flex between mb"><span>Deni la sasa</span><b class="warn-t" style="font-size:1.3rem">${fmt(bal)}</b></div>

  `, `<button class="btn btn-ghost" data-close>Ghairi</button><button class="btn btn-primary" id="pdSave">Thibitisha</button>`);
  document.getElementById('pdSave').onclick=()=>{
    const amt=Math.min(num('pdAmt'),bal); if(amt<=0){ toast('Weka kiasi','err'); return; }
    po.paid+=amt;
    const supp=DB.suppliers.find(s=>s.id===po.suppId); if(supp) supp.balance=Math.max(0,supp.balance-amt);
    audit('Malipo kwa msambazaji', po.ref+' • '+fmt(amt));
    save(); m.close(); toast('Malipo yamerekodiwa'); pagePurchases(el);
  };
}

/* ================= STAFF CHAT ================= */
function chatPeerId(roomId){ return roomId.startsWith('dm_') ? roomId.slice(3) : null; }
/* mark all messages in a room addressed to me as read */
function markRoomRead(roomId){
  let changed=false;
  DB.chat.forEach(m=>{
    const forMe = roomId==='general' ? m.from!==STATE.user.id : (m.room===roomId && m.from!==STATE.user.id);
    if(m.room===roomId && forMe && !(m.readBy||[]).includes(STATE.user.id)){ m.readBy=[...(m.readBy||[]),STATE.user.id]; changed=true; }
  });
  if(changed) save();
}
/* count unread messages for current user, grouped by room */
function unreadByRoom(){
  const map={};
  DB.chat.forEach(m=>{
    if(m.from===STATE.user.id) return;
    const isForMe = m.room==='general' || m.room==='dm_'+STATE.user.id;
    if(!isForMe) return;
    if(!(m.readBy||[]).includes(STATE.user.id)){ map[m.room]=(map[m.room]||0)+1; }
  });
  return map;
}
function totalUnread(){ return Object.values(unreadByRoom()).reduce((a,b)=>a+b,0); }

function pageStaffChat(el){
  const active = STATE.chatRoom || 'general';
  // for DM rooms: the room key is the recipient's box. We store with room = 'dm_<recipientId>'
  // so a conversation between A and B uses two keys; we merge them for display.
  const rooms = [{id:'general',name:'Wote (General)',emoji:'📢'},...DB.users.filter(u=>u.id!==STATE.user.id&&u.active).map(u=>({id:'dm_'+u.id,name:u.name,emoji:'👤',role:u.role,peer:u.id}))];
  const activeRoom = rooms.find(r=>r.id===active) || rooms[0];
  const unread = unreadByRoom();

  let msgs;
  if(active==='general'){ msgs = DB.chat.filter(m=>m.room==='general'); }
  else { const peer=chatPeerId(active);
    msgs = DB.chat.filter(m=>(m.room==='dm_'+peer && m.from===STATE.user.id) || (m.room==='dm_'+STATE.user.id && m.from===peer))
      .sort((a,b)=>(a.at||'').localeCompare(b.at||'')); }

  // mark read for whichever inbound key applies to me
  markRoomRead(active==='general'?'general':'dm_'+STATE.user.id);

  el.innerHTML = `
  <div class="page chat-wrap2">
    <div class="chat-rooms">
      <div class="nav-group-label" style="padding:.4rem .6rem">Vyumba</div>
      ${rooms.map(r=>{
        const key = r.id==='general'?'general':'dm_'+STATE.user.id; // my inbox key for this peer is general or my own dm box
        // unread for general is straightforward; for DM, unread sits in my dm box from this peer
        let u = 0;
        if(r.id==='general') u = unread['general']||0;
        else u = DB.chat.filter(m=>m.room==='dm_'+STATE.user.id && m.from===r.peer && !(m.readBy||[]).includes(STATE.user.id)).length;
        return `<button class="room-item ${active===r.id?'active':''}" data-room="${r.id}">
          <span class="r-ava">${r.emoji}</span>
          <span style="flex:1;min-width:0">${r.name}${r.role?`<div class="mini" style="color:inherit;opacity:.7">${roleLabel(r.role)}</div>`:''}</span>
          ${u?`<span class="unread-badge">${u}</span>`:''}</button>`;
      }).join('')}
    </div>
    <div class="chat-main">
      <div class="chat-head"><span class="r-ava" style="width:34px;height:34px;border-radius:10px;background:var(--surface-3);display:grid;place-items:center">${activeRoom.emoji}</span>
        <div><b>${activeRoom.name}</b><div class="mini">${active==='general'?'Ujumbe kwa wafanyakazi wote':'Mazungumzo binafsi'}</div></div></div>
      <div class="chat-body" id="chatBody">
        ${msgs.length?msgs.map(m=>chatBubble(m,active)).join(''):'<div class="empty" style="margin:auto">Hakuna ujumbe bado. Anza mazungumzo!</div>'}
      </div>
      <div class="chat-input">
        <textarea id="chatInput" placeholder="Andika ujumbe..." rows="1"></textarea>
        <button class="send-btn" id="chatSend">${I.send}</button>
      </div>
    </div>
  </div>`;
  document.querySelectorAll('[data-room]').forEach(b=>b.onclick=()=>{ STATE.chatRoom=b.dataset.room; pageStaffChat(el); });
  const input=document.getElementById('chatInput');
  const body=document.getElementById('chatBody'); if(body) body.scrollTop=body.scrollHeight;
  const send=()=>{
    const txt=input.value.trim(); if(!txt) return;
    // general broadcasts to everyone; DM goes into recipient's dm box
    const room = active==='general' ? 'general' : active; // active is 'dm_<peer>' = recipient's inbox
    DB.chat.push({ id:uid('ch'), room, from:STATE.user.id, fromName:STATE.user.name, body:txt, at:now(), readBy:[STATE.user.id] });
    if(DB.chat.length>1000) DB.chat=DB.chat.slice(-1000);
    save(); pageStaffChat(el);
  };
  document.getElementById('chatSend').onclick=send;
  input.onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } };
  input.oninput=()=>{ input.style.height='44px'; input.style.height=Math.min(input.scrollHeight,100)+'px'; };
  // delete own message
  document.querySelectorAll('[data-delmsg]').forEach(b=>b.onclick=()=>{
    if(confirm('Futa ujumbe huu?')){ DB.chat=DB.chat.filter(m=>m.id!==b.dataset.delmsg); save(); pageStaffChat(el); }
  });
}
function chatBubble(m, active){
  const mine = m.from===STATE.user.id;
  const t = new Date(m.at).toLocaleTimeString('sw-TZ',{hour:'2-digit',minute:'2-digit'});
  // for my messages, show read status: read if anyone other than me has read
  const readByOthers = (m.readBy||[]).some(id=>id!==STATE.user.id);
  const status = mine ? (readByOthers ? `<span class="m-read">✓✓ imesomwa</span>` : `<span class="m-unread">• haijasomwa</span>`) : '';
  return `<div class="msg ${mine?'me':'them'}">
    ${!mine?`<div class="m-who">${m.fromName}</div>`:''}
    <div>${m.body.replace(/</g,'&lt;')}</div>
    <div class="m-meta">
      <span class="m-time">${t}</span>${status}
      ${mine?`<button class="m-del" data-delmsg="${m.id}" title="Futa">${I.trash}</button>`:''}
    </div>
  </div>`;
}

function pageReports(el){
  const range = STATE.repRange||'month';
  let from,to=today(),label;
  const d=new Date();
  if(range==='today'){ from=today(); label='Leo'; }
  else if(range==='week'){ const w=new Date(); w.setDate(w.getDate()-6); from=w.toISOString().slice(0,10); label='Wiki (siku 7)'; }
  else if(range==='month'){ from=monthStart(); label='Mwezi Huu'; }
  else { from=new Date(d.getFullYear(),0,1).toISOString().slice(0,10); label='Mwaka '+d.getFullYear(); }

  const sales = salesBetween(from,to);
  const income = sumSales(sales);
  const profit = sumProfit(sales);
  const exp = DB.expenses.filter(e=>e.date>=from&&e.date<=to).reduce((a,e)=>a+e.amount,0);
  const tx = sales.length;
  const avg = tx?income/tx:0;
  // purchases (PO received) in range
  const posInRange = DB.purchaseOrders.filter(p=>p.received && p.receivedDate>=from && p.receivedDate<=to);
  const purchases = posInRange.reduce((a,p)=>a+p.total,0);
  const purchasesPaid = posInRange.reduce((a,p)=>a+p.paid,0);

  // top & slow products
  const pc={}, pcQty={};
  sales.forEach(s=>s.items.forEach(it=>{ pc[it.name]=(pc[it.name]||0)+it.price*it.qty; pcQty[it.name]=(pcQty[it.name]||0)+it.qty; }));
  const ranked = Object.entries(pcQty).sort((a,b)=>b[1]-a[1]);
  const top = ranked.slice(0,6);
  const maxQ = Math.max(...top.map(t=>t[1]),1);

  // daily trend within range (max 14 points)
  const trend=[]; const dayCount = Math.min(14, range==='today'?1:range==='week'?7:range==='month'?new Date().getDate():12);
  if(range==='year'){
    for(let mo=0;mo<=d.getMonth();mo++){ const f=new Date(d.getFullYear(),mo,1).toISOString().slice(0,10); const tt=new Date(d.getFullYear(),mo+1,0).toISOString().slice(0,10);
      const buy=DB.purchaseOrders.filter(p=>p.received&&p.receivedDate>=f&&p.receivedDate<=tt).reduce((a,p)=>a+p.total,0);
      trend.push({lbl:new Date(d.getFullYear(),mo,1).toLocaleDateString('sw-TZ',{month:'short'}), v:sumSales(salesBetween(f,tt)), buy}); }
  } else {
    for(let i=dayCount-1;i>=0;i--){ const dd=new Date(); dd.setDate(dd.getDate()-i); const ds=dd.toISOString().slice(0,10);
      const buy=DB.purchaseOrders.filter(p=>p.received&&p.receivedDate===ds).reduce((a,p)=>a+p.total,0);
      trend.push({lbl:dd.toLocaleDateString('sw-TZ',{day:'numeric',month:'short'}), v:sumSales(salesBetween(ds,ds)), buy}); }
  }
  const maxT=Math.max(...trend.map(t=>Math.max(t.v,t.buy||0)),1);

  el.innerHTML=`
  <div class="page" id="reportArea">
    <div class="toolbar no-print">
      <div class="chip-row">
        ${[['today','Leo'],['week','Wiki'],['month','Mwezi'],['year','Mwaka']].map(([k,l])=>`<button class="chip ${range===k?'active':''}" data-rep="${k}">${l}</button>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="printRep" style="margin-left:auto">${I.print} Pakua PDF</button>
    </div>

    <div class="report-hero">
      <div class="mini" style="opacity:.85">Ripoti ya Mauzo & Faida • ${label}</div>
      <h2>${fmt(income)}</h2>
      <div class="mini" style="opacity:.85">JM House of Fashion • ${dateSw(from)} - ${dateSw(to)}</div>
      <div class="kpi-row">
        <div class="kpi"><div class="k-l">Miamala</div><div class="k-v">${tx}</div></div>
        <div class="kpi"><div class="k-l">Wastani/Mauzo</div><div class="k-v">${fmtN(avg)}</div></div>
        <div class="kpi"><div class="k-l">Faida</div><div class="k-v">${fmtN(profit)}</div></div>
        <div class="kpi"><div class="k-l">Faida Halisi</div><div class="k-v">${fmtN(profit-exp)}</div></div>
      </div>
    </div>

    <div class="card mb">
      <div class="card-h"><h3>Mwenendo: Mauzo vs Manunuzi</h3>
        <div class="flex center gap mini"><span class="leg-dot sale"></span>Mauzo <span class="leg-dot buy"></span>Manunuzi</div></div>
      <div class="chart-wrap"><div class="bar-chart dual">
        ${trend.map(p=>`<div class="bar-pair">
          <div class="bar" style="height:${Math.max(p.v/maxT*100,2)}%" title="Mauzo ${fmt(p.v)}"><span class="b-val">${p.v?fmtN(p.v/1000)+'k':''}</span></div>
          <div class="bar buy" style="height:${Math.max((p.buy||0)/maxT*100,2)}%" title="Manunuzi ${fmt(p.buy||0)}"></div>
          <span class="b-lbl">${p.lbl}</span>
        </div>`).join('')}
      </div></div>
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card">
        <div class="card-h"><h3>Bidhaa Zinazoongoza</h3></div>
        ${top.length?top.map(([n,q])=>`<div style="margin-bottom:.7rem">
          <div class="flex between"><span>${n}</span><b>${q} pcs • ${fmt(pc[n])}</b></div>
          <div style="height:7px;background:var(--surface-3);border-radius:5px;margin-top:.3rem;overflow:hidden"><div style="height:100%;width:${q/maxQ*100}%;background:linear-gradient(90deg,var(--violet-500),var(--rose));border-radius:5px"></div></div>
        </div>`).join(''):'<div class="empty">Hakuna mauzo katika kipindi hiki</div>'}
      </div>
      <div class="card">
        <div class="card-h"><h3>Bidhaa Zinazokwenda Polepole</h3></div>
        ${(()=>{ const slow=DB.products.filter(p=>p.active&&!pcQty[p.name]).slice(0,8);
          return slow.length?slow.map(p=>`<div class="flex between center" style="padding:.5rem 0;border-bottom:1px solid var(--border-soft)"><span>${p.emoji} ${p.name}</span><span class="pill muted">Stoo: ${p.stock}</span></div>`).join(''):'<div class="empty">Bidhaa zote zinauzwa vyema 🎉</div>'; })()}
      </div>
    </div>

    <div class="card mt">
      <div class="card-h"><h3>Muhtasari wa Kifedha</h3></div>
      <div class="tbl-wrap"><table>
        <tbody>
          <tr><td>Mauzo (Income)</td><td class="txt-r fw7">${fmt(income)}</td></tr>
          <tr><td>Faida Ghafi (Gross Profit)</td><td class="txt-r fw7 ok-t">${fmt(profit)}</td></tr>
          <tr><td>Manunuzi ya Bidhaa (PO)</td><td class="txt-r fw7">${fmt(purchases)}</td></tr>
          <tr><td class="mini" style="padding-left:1.5rem">— kati ya hayo, yaliyolipwa</td><td class="txt-r mini">${fmt(purchasesPaid)}</td></tr>
          <tr><td>Matumizi (Expenses)</td><td class="txt-r fw7 danger-t">${fmt(exp)}</td></tr>
          <tr><td><b>Faida Halisi (Net Profit)</b></td><td class="txt-r fw7 ${(profit-exp)>=0?'accent':'danger-t'}" style="font-size:1.1rem">${fmt(profit-exp)}</td></tr>
        </tbody>
      </table></div>
      <div class="mini mt">Manunuzi (PO) yanaonyeshwa kama mtaji wa stoo — yameshajumuishwa kwenye faida kupitia gharama ya bidhaa zilizouzwa.</div>
    </div>
  </div>`;
  document.querySelectorAll('[data-rep]').forEach(b=>b.onclick=()=>{ STATE.repRange=b.dataset.rep; pageReports(el); });
  document.getElementById('printRep').onclick=()=>exportReportPDF(label, from, to);
}
/* export report as PDF via a clean print window (user picks "Save as PDF") */
function exportReportPDF(label, from, to){
  const node = document.getElementById('reportArea'); if(!node) return;
  const clone = node.cloneNode(true);
  clone.querySelectorAll('.no-print').forEach(n=>n.remove());
  const s = DB.settings;
  const w = window.open('','','width=820,height=900');
  w.document.write(`<html><head><title>Ripoti ${label} — ${s.name}</title><meta charset="utf-8"><style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
    body{padding:24px;color:#1a1a1a;background:#fff;}
    .pdf-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #6a2db0;padding-bottom:12px;margin-bottom:18px;}
    .pdf-head h1{font-size:20px;color:#3f1a6b;} .pdf-head .mini{font-size:12px;color:#666;}
    .report-hero{background:#3f1a6b;color:#fff;border-radius:14px;padding:18px;margin-bottom:16px;}
    .report-hero h2{font-size:24px;margin:4px 0;} .report-hero .mini{opacity:.85;font-size:12px;}
    .kpi-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;} .kpi{background:rgba(255,255,255,.12);border-radius:10px;padding:10px;flex:1;min-width:110px;}
    .kpi .k-l{font-size:11px;opacity:.85;} .kpi .k-v{font-size:17px;font-weight:bold;margin-top:3px;}
    .card{border:1px solid #ddd;border-radius:12px;padding:14px;margin-bottom:14px;}
    .card-h{margin-bottom:10px;} .card-h h3{font-size:15px;color:#3f1a6b;}
    table{width:100%;border-collapse:collapse;font-size:13px;} th,td{text-align:left;padding:7px 9px;border-bottom:1px solid #eee;}
    th{background:#f3eefb;color:#555;font-size:11px;text-transform:uppercase;}
    .txt-r{text-align:right;} .fw7{font-weight:bold;} .ok-t{color:#1a8f5e;} .danger-t{color:#c0392b;} .accent{color:#6a2db0;}
    .bar-chart,.chart-wrap{display:none;} /* charts skipped in print for clarity */
    .grid{display:flex;gap:14px;flex-wrap:wrap;} .grid>.card{flex:1;min-width:280px;}
    .mini{font-size:11px;color:#666;} .leg-dot{display:none;}
    .pill{padding:2px 7px;border-radius:10px;font-size:11px;background:#eee;}
    @page{size:A4;margin:14mm;}
  </style></head><body>
    <div class="pdf-head">
      <div><h1>${s.name}</h1><div class="mini">${s.location} • ${s.phone}</div></div>
      <div style="text-align:right"><b>RIPOTI YA BIASHARA</b><div class="mini">${label}<br>${dateSw(from)} - ${dateSw(to)}</div></div>
    </div>
    ${clone.innerHTML}
    <div class="mini" style="text-align:center;margin-top:20px;color:#999">Imetolewa na mfumo wa JM House of Fashion • ${new Date().toLocaleString('sw-TZ')}</div>
  </body></html>`);
  w.document.close();
  setTimeout(()=>{ w.focus(); w.print(); }, 400);
  toast('Chagua "Save as PDF" kwenye dirisha la kuchapisha');
}

/* ================= MESSAGES (SMS/WhatsApp generator) ================= */
function pageMessages(el){
  el.innerHTML=`
  <div class="page">
    <div class="card mb">
      <div class="card-h"><h3>Tengeneza Ujumbe</h3></div>
      <div class="form-grid">
        <div><label class="mini">Mteja</label><select class="inp" id="msgCust"><option value="">— Chagua mteja —</option>${DB.customers.map(c=>`<option value="${c.id}">${c.name} (${c.phone})</option>`).join('')}</select></div>
        <div><label class="mini">Aina ya Ujumbe</label><select class="inp" id="msgTpl">
          <option value="thanks">Shukrani baada ya mauzo</option>
          <option value="debt">Ukumbusho wa deni</option>
          <option value="promo">Tangazo / Bidhaa mpya</option>
          <option value="custom">Andika mwenyewe</option>
        </select></div>
        <div class="full"><label class="mini">Ujumbe</label><textarea class="inp" id="msgBody" style="min-height:110px"></textarea></div>
      </div>
      <div class="btn-row mt">
        <button class="btn btn-primary" id="sendWa">${I.wa} Fungua WhatsApp</button>
        <button class="btn btn-ghost" id="sendSms">📩 Fungua SMS</button>
        <button class="btn btn-ghost" id="copyMsg">Nakili Ujumbe</button>
      </div>
      <div class="mini mt">💡 Ujumbe utafunguliwa kwenye app ya WhatsApp au SMS ya simu yako — hauhitaji internet ya mfumo.</div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Matangazo ya Kundi</h3></div>
      <div class="mini mb">Tuma tangazo kwa kundi la wateja — litafunguliwa moja moja kwa kila mteja (WhatsApp/SMS).</div>
      <div class="form-grid">
        <div><label class="mini">Wapokeaji</label><select class="inp" id="bcSeg">
          <option value="all">Wateja wote wenye namba (${DB.customers.filter(c=>c.phone).length})</option>
          <option value="debt">Wadaiwa pekee (${DB.customers.filter(c=>c.debt>0&&c.phone).length})</option>
          <option value="loyal">Wateja waaminifu — pointi 100+ (${DB.customers.filter(c=>c.points>=100&&c.phone).length})</option>
        </select></div>
        <div><label class="mini">Kiolezo</label><select class="inp" id="bcTpl">
          <option value="promo">Tangazo la bidhaa mpya / ofa</option>
          <option value="thanks">Shukrani kwa wateja</option>
          <option value="debt">Ukumbusho wa madeni</option>
          <option value="custom">Andika mwenyewe</option>
        </select></div>
        <div class="full"><label class="mini">Ujumbe (tumia {jina} kuingiza jina la mteja)</label><textarea class="inp" id="bcBody" style="min-height:90px"></textarea></div>
      </div>
      <div class="btn-row mt">
        <button class="btn btn-primary btn-sm" id="bcStart">${I.wa} Anza Kutuma WhatsApp</button>
        <button class="btn btn-ghost btn-sm" id="bcSms">📩 Anza Kutuma SMS</button>
      </div>
      <div id="bcProgress" class="mt"></div>
    </div>
  </div>`;
  const tpl=(type,c)=>{
    const nm=c?c.name:'mteja';
    if(type==='thanks') return `Habari ${nm}! Asante kwa kununua JM House of Fashion 💜. Karibu tena! Tunakuthamini.`;
    if(type==='debt') return `Habari ${nm}, huu ni ukumbusho kuwa una salio la deni la ${c?fmt(c.debt):'TZS 0'} JM House of Fashion. Tafadhali lipa kwa wakati. Asante!`;
    if(type==='promo') return `Habari ${nm}! 🎉 JM House of Fashion tumepokea mavazi mapya ya kisasa. Karibu uone bidhaa mpya. Shinyanga.`;
    return '';
  };
  const upd=()=>{ const c=DB.customers.find(x=>x.id===val('msgCust')); const tp=val('msgTpl');
    if(tp!=='custom') document.getElementById('msgBody').value=tpl(tp,c); };
  document.getElementById('msgCust').onchange=upd; document.getElementById('msgTpl').onchange=upd; upd();
  const getPhone=()=>{ const c=DB.customers.find(x=>x.id===val('msgCust')); return c?c.phone.replace(/[^0-9]/g,''):''; };
  document.getElementById('sendWa').onclick=()=>{ const ph=getPhone(); const b=encodeURIComponent(val('msgBody'));
    if(!val('msgBody')){ toast('Andika ujumbe','err'); return; } window.open(`https://wa.me/${ph}?text=${b}`,'_blank');
    if(val('msgCust')) logMsg('WhatsApp'); };
  document.getElementById('sendSms').onclick=()=>{ const ph=getPhone(); const b=encodeURIComponent(val('msgBody'));
    if(!val('msgBody')){ toast('Andika ujumbe','err'); return; } window.open(`sms:${ph}?body=${b}`,'_self'); if(val('msgCust')) logMsg('SMS'); };
  document.getElementById('copyMsg').onclick=()=>{ navigator.clipboard?.writeText(val('msgBody')); toast('Ujumbe umenakiliwa'); };

  // ---- group broadcast ----
  const bcTpl=(type)=>{
    if(type==='promo') return `Habari {jina}! 🎉 JM House of Fashion tumepokea mavazi mapya ya kisasa na ofa maalum. Karibu Shinyanga uone!`;
    if(type==='thanks') return `Habari {jina}! Asante kwa kuwa mteja wetu mwaminifu JM House of Fashion 💜. Tunakuthamini.`;
    if(type==='debt') return `Habari {jina}, ukumbusho wa salio lako la deni JM House of Fashion. Tafadhali pita kulipa. Asante!`;
    return '';
  };
  const bcUpd=()=>{ const tp=val('bcTpl'); if(tp!=='custom') document.getElementById('bcBody').value=bcTpl(tp); };
  document.getElementById('bcTpl').onchange=bcUpd; bcUpd();
  const recipients=()=>{ const seg=val('bcSeg');
    return DB.customers.filter(c=>c.phone).filter(c=> seg==='debt'?c.debt>0 : seg==='loyal'?c.points>=100 : true); };
  const runBroadcast=(via)=>{
    const body=val('bcBody'); if(!body){ toast('Andika ujumbe','err'); return; }
    const list=recipients(); if(!list.length){ toast('Hakuna wapokeaji','err'); return; }
    const prog=document.getElementById('bcProgress');
    if(via==='sms'){
      // send to all recipients at once via a single multi-recipient SMS link
      const nums=list.map(c=>c.phone.replace(/[^0-9]/g,'')).filter(Boolean).join(',');
      // group SMS uses one shared body; {jina} can't personalise a bulk send, so use a neutral greeting
      const msg=body.replace(/{jina}/g,'mteja');
      window.open(`sms:${nums}?body=${encodeURIComponent(msg)}`,'_self');
      list.forEach(c=>DB.messages.unshift({id:uid('m'),via:'SMS',to:c.id,body:msg,at:now()}));
      save();
      prog.innerHTML=`<div class="bc-row"><span>✓ SMS imeandaliwa kwa wateja <b>${list.length}</b> kwa pamoja</span></div>`;
      toast('SMS ya kundi imeandaliwa kwa wateja '+list.length);
      return;
    }
    // WhatsApp has no native bulk link, so we list each (one tap per recipient)
    let i=0;
    prog.innerHTML=`<div class="mini mb">WhatsApp haina utumaji wa pamoja — bofya Tuma kwa kila mteja:</div><div class="bc-list"></div>`;
    const box=prog.querySelector('.bc-list');
    list.forEach((c,idx)=>{
      const row=document.createElement('div'); row.className='bc-row';
      row.innerHTML=`<span>${c.name}<div class="mini">${c.phone}</div></span><button class="btn btn-ghost btn-sm" data-bcsend="${idx}">${I.wa} Tuma</button>`;
      box.appendChild(row);
    });
    box.querySelectorAll('[data-bcsend]').forEach(b=>b.onclick=()=>{
      const c=list[+b.dataset.bcsend]; const ph=c.phone.replace(/[^0-9]/g,'');
      const msg=body.replace(/{jina}/g,c.name);
      window.open(`https://wa.me/${ph}?text=${encodeURIComponent(msg)}`,'_blank');
      b.textContent='✓ Imetumwa'; b.classList.add('ok-t'); b.disabled=true;
      DB.messages.unshift({id:uid('m'),via:'WhatsApp',to:c.id,body:msg,at:now()}); save();
    });
    toast('Wateja '+list.length+' wako tayari — bofya Tuma kwa kila mmoja');
  };
  document.getElementById('bcStart').onclick=()=>runBroadcast('wa');
  document.getElementById('bcSms').onclick=()=>runBroadcast('sms');
  function logMsg(via){ DB.messages.unshift({id:uid('m'),via,to:val('msgCust'),body:val('msgBody'),at:now()}); save(); }
}
