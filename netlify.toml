[build]
  publish = "."

# Shared-state API must be matched before the SPA catch-all below.
[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

# Single-page app: serve index.html for all routes (back-button & deep links work)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
